database:
  type: "postgresql"
  host: "${DB_HOST:localhost}"
  port: "${DB_PORT:5432}"
  database: "${DB_NAME:commit_risk_db}"
  username: "${DB_USERNAME}"
  password: "${DB_PASSWORD}"
  pool:
    min_size: 2
    max_size: 10
    timeout_seconds: 30
tables:
  raw_commits:
    name: "raw_commits"
    columns:
      - commit_hash
      - author
      - timestamp
      - message
      - files_changed
      - lines_added
      - lines_deleted
      - created_at
  labels:
    name: "labels"
    columns:
      - commit_hash
      - is_buggy
      - labeled_by
      - confidence
      - created_at
  commit_features:
    name: "commit_features"
    columns:
      - commit_hash
      - lines_added
      - lines_deleted
      - total_churn
      - files_changed
      - touches_core
      - touches_tests
      - hour_of_day
      - day_of_week
      - is_weekend
      - created_at
  developer_features:
    name: "developer_features"
    columns:
      - author
      - total_commits
      - bug_rate
      - recent_frequency
      - updated_at
  predictions:
    name: "predictions"
    columns:
      - id
      - commit_hash
      - risk_score
      - model_version
      - predicted_at
  decisions:
    name: "decisions"
    columns:
      - id
      - prediction_id
      - decision
      - threshold_used
      - created_at
  explanations:
    name: "explanations"
    columns:
      - id
      - prediction_id
      - explanation_text
      - top_features
      - created_at
  model_metadata:
    name: "model_metadata"
    columns:
      - model_version
      - model_path
      - metrics
      - deployed_at
      - status
initialization:
  auto_create_tables: true
  drop_existing: false
  run_migrations: false
